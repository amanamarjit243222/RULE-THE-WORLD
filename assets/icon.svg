<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep, dark, professional tech-thriller background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="60%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    
    <!-- Glowing globe elements -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <!-- Pattern for map hex/tech overlay -->
    <pattern id="hexPattern" x="0" y="0" width="12" height="20.7846" patternUnits="userSpaceOnUse">
      <path d="M6 0 L12 3.4641 L12 10.3923 L6 13.8564 L0 10.3923 L0 3.4641 Z" fill="none" stroke="#ef4444" stroke-width="0.3" opacity="0.1"/>
      <path d="M6 20.7846 L12 17.3205 L12 10.3923 L6 13.8564 L0 10.3923 L0 17.3205 Z" fill="none" stroke="#ef4444" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background base -->
  <rect width="512" height="512" fill="url(#bg)"/>
  
  <!-- Outer complex targeting reticle -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="222" fill="none" stroke="#dc2626" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.5"/>
  <circle cx="256" cy="256" r="218" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Corner tactical markers -->
  <path d="M 40,40 L 40,80 M 40,40 L 80,40" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.7"/>
  <path d="M 472,40 L 472,80 M 472,40 L 432,40" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.7"/>
  <path d="M 40,472 L 40,432 M 40,472 L 80,472" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.7"/>
  <path d="M 472,472 L 472,432 M 472,472 L 432,472" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.7"/>

  <!-- Globe / Earth core -->
  <g transform="translate(0, -10)">
    <!-- Base globe dark metallic orb -->
    <circle cx="256" cy="256" r="160" fill="#020617"/>
    <circle cx="256" cy="256" r="160" fill="url(#hexPattern)"/>
    
    <!-- Wireframe Lat/Lon -->
    <ellipse cx="256" cy="256" rx="160" ry="40" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.25"/>
    <ellipse cx="256" cy="256" rx="160" ry="100" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.15"/>
    <path d="M 96,256 A 160,160 0 0,0 416,256 A 160,160 0 0,0 96,256" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.25"/>
    <path d="M 256,96 A 50,160 0 0,0 256,416 A 50,160 0 0,0 256,96" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.15"/>
    <path d="M 256,96 L 256,416" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.25"/>

    <!-- Professional Map Vectors (Stylized Continents in crisp, high-tech red) -->
    <g fill="#dc2626" opacity="0.8" filter="url(#subtleGlow)">
      <!-- North America -->
      <path d="M 140,170 Q 150,150 170,140 Q 180,145 190,140 L 195,160 L 180,175 L 185,190 L 170,210 L 155,200 Z"/>
      <!-- South America -->
      <path d="M 185,210 L 210,210 L 225,240 L 210,290 L 195,330 Q 180,310 185,260 Z"/>
      <!-- Europe & Central Asia -->
      <path d="M 240,150 L 255,130 L 280,120 L 310,135 L 340,130 L 330,165 L 290,175 L 270,165 L 250,170 Z"/>
      <!-- Middle East & Africa -->
      <path d="M 245,180 L 275,175 Q 290,200 300,210 L 310,230 L 295,260 L 280,320 L 260,300 L 235,260 L 225,230 L 245,200 Z"/>
      <!-- East Asia -->
      <path d="M 330,165 L 370,150 L 385,170 L 375,190 L 360,215 L 340,225 L 315,220 L 305,210 Q 310,190 320,180 Z"/>
      <!-- Oceania / SEA -->
      <path d="M 345,235 L 360,230 L 370,245 L 355,260 L 340,250 Z"/>
      <path d="M 360,270 L 390,265 L 400,285 L 380,310 L 350,300 Z"/>
    </g>

    <!-- Glowing orbital/targeting ring -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="#ef4444" stroke-width="4" opacity="0.6" filter="url(#glow)"/>
    <circle cx="256" cy="256" r="165" fill="none" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="1 3"/>
  </g>

  <!-- Title / Branding Typography -->
  <!-- Subtle back text -->
  <text x="256" y="440" font-family="'JetBrains Mono', monospace, Arial" font-size="12" font-weight="700" text-anchor="middle" fill="#94a3b8" letter-spacing="8" opacity="0.6">SIMULATION 2029</text>
  
  <!-- Main Title -->
  <text x="256" y="475" font-family="Arial Black, Impact, sans-serif" font-size="46" font-weight="900" text-anchor="middle" fill="#ffffff" letter-spacing="5" filter="url(#glow)">RULE THE WORLD</text>
  
  <!-- Top Title / Dev mark -->
  <text x="256" y="45" font-family="'JetBrains Mono', monospace, Arial" font-size="10" font-weight="700" text-anchor="middle" fill="#ef4444" letter-spacing="12" opacity="0.8">DEVELOPED BY AAJ</text>

  <!-- Crown (Vector sleek, hyper-modern, stealth-fighter style) -->
  <g transform="translate(0, -25)">
    <path d="M 190,95 L 210,50 L 230,85 L 256,35 L 282,85 L 302,50 L 322,95 L 190,95 Z" fill="#ef4444" filter="url(#glow)"/>
    <!-- Crown inner cutouts for tech look -->
    <path d="M 196,92 L 210,58 L 226,86 L 256,44 L 286,86 L 302,58 L 316,92 Z" fill="#0f172a"/>
    <!-- Glowing core in crown -->
    <polygon points="256,60 264,88 248,88" fill="#ef4444" filter="url(#glow)"/>
  </g>

</svg>
